services:
  crawl4ai:
    build:
      context: .
      dockerfile: Dockerfile

    image: crawl4ai:local

    ports:
      - "11235:11235"

    environment:
      CRAWL4AI_API_TOKEN: ${CRAWL4AI_API_TOKEN}

    shm_size: 2gb

    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    tmpfs:
      - /tmp

    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:11235/health
      interval: 30s
      timeout: 10s
      retries: 3
